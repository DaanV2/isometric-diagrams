<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Isometric Diagrams">
  <defs>
    <!-- App background gradient (centre → edge), matching the diagram canvas. -->
    <radialGradient id="bg" cx="50%" cy="42%" r="75%">
      <stop offset="0%" stop-color="#141b27" />
      <stop offset="100%" stop-color="#0a0e16" />
    </radialGradient>
    <!-- Vertical depth shade applied to the vertical faces. -->
    <linearGradient id="faceShade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.10" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0.18" />
    </linearGradient>
    <!-- Glossy sheen across the top face. -->
    <linearGradient id="topSheen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.35" />
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="64" height="64" rx="14" fill="url(#bg)" />

  <!-- Cube built from the app's 2:1 isometric projection (tileSize 14), centred. -->
  <g transform="translate(32,33)">
    <!-- Soft contact shadow grounding the cube. -->
    <ellipse cx="0" cy="17" rx="19" ry="7" fill="#000000" opacity="0.38" />

    <!-- Left face — shadowed side. -->
    <polygon points="-14,-7 0,0 0,14 -14,7" fill="#4345a4" />
    <polygon points="-14,-7 0,0 0,14 -14,7" fill="url(#faceShade)" />

    <!-- Right face — lit mid-tone. -->
    <polygon points="14,-7 0,0 0,14 14,7" fill="#6366f1" />
    <polygon points="14,-7 0,0 0,14 14,7" fill="url(#faceShade)" />

    <!-- Top face — brightest, catches the light. -->
    <polygon points="0,-14 14,-7 0,0 -14,-7" fill="#8c8ef5" />
    <polygon points="0,-14 14,-7 0,0 -14,-7" fill="url(#topSheen)" />

    <!-- Crisp edge highlight along the silhouette. -->
    <path d="M0,-14 L14,-7 L14,7 L0,14 L-14,7 L-14,-7 Z M14,-7 L0,0 L-14,-7 M0,0 L0,14"
          fill="none" stroke="#b1b3f8" stroke-width="1" stroke-linejoin="round" stroke-opacity="0.85" />
  </g>
</svg>
